<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0e14;
    color: #b3b1ad;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #toolbar {
    background: #1a1f29;
    border-bottom: 1px solid #2a2f3a;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }

  #toolbar .dot { width: 12px; height: 12px; border-radius: 50%; }
  #toolbar .dot.red { background: #ff5f56; }
  #toolbar .dot.yellow { background: #ffbd2e; }
  #toolbar .dot.green { background: #27c93f; }
  #toolbar .title { color: #636973; font-size: 12px; margin-left: 8px; }

  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
  }

  #terminal::-webkit-scrollbar { width: 8px; }
  #terminal::-webkit-scrollbar-track { background: #0a0e14; }
  #terminal::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 4px; }

  .line { white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  .line.cmd { color: #39bae6; }
  .line.output { color: #c2d94c; }
  .line.error { color: #ff3333; }
  .line.info { color: #636973; font-style: italic; }

  .prompt-prefix { color: #ff8f40; }
  .prompt-path { color: #59c2ff; }
  .prompt-symbol { color: #c2d94c; }

  #input-area {
    display: flex;
    align-items: center;
    padding: 8px 16px 12px;
    background: #0d1117;
    border-top: 1px solid #2a2f3a;
  }

  #prompt-label {
    color: #ff8f40;
    margin-right: 4px;
    white-space: nowrap;
  }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e6e1cf;
    font-family: inherit;
    font-size: 14px;
    caret-color: #39bae6;
  }

  #status-bar {
    background: #1a1f29;
    border-top: 1px solid #2a2f3a;
    padding: 3px 16px;
    font-size: 11px;
    color: #636973;
    display: flex;
    justify-content: space-between;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid #39bae6;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="toolbar">
  <span class="dot red"></span>
  <span class="dot yellow"></span>
  <span class="dot green"></span>
  <span class="title">pentest-shell@container</span>
</div>

<div id="terminal">
  <div class="line info">[ Secure Shell - AES-256-GCM Encrypted Channel ]</div>
  <div class="line info">Type 'help' for available commands. All I/O is encrypted.</div>
  <div class="line">&nbsp;</div>
</div>

<div id="input-area">
  <span id="prompt-label">root@container:~# </span>
  <input type="text" id="cmd-input" autocomplete="off" autofocus spellcheck="false" placeholder="Enter command...">
</div>

<div id="status-bar">
  <span id="status-text">Ready</span>
  <span id="status-crypto">AES-256-GCM Active</span>
</div>

<script src="{{ url_for('static', filename='js/forge.min.js') }}"></script>
<script>
(function() {
  const KEY_HEX = "{{ aes_key }}";
  const EXEC_URL = "/exec";

  const terminal = document.getElementById("terminal");
  const cmdInput = document.getElementById("cmd-input");
  const statusText = document.getElementById("status-text");

  const promptLabel = document.getElementById("prompt-label");

  const history = [];
  let historyIdx = -1;
  let busy = false;
  let currentCwd = "/";

  function hexToBytes(hex) {
    return forge.util.hexToBytes(hex);
  }

  function randomBytes(n) {
    return forge.random.getBytesSync(n);
  }

  function encryptText(text) {
    const key = hexToBytes(KEY_HEX);
    const nonce = randomBytes(12);
    const cipher = forge.cipher.createCipher("AES-GCM", key);
    cipher.start({ iv: nonce, tagLength: 128 });
    cipher.update(forge.util.createBuffer(forge.util.encodeUtf8(text)));
    cipher.finish();
    return {
      nonce: forge.util.encode64(nonce),
      ciphertext: forge.util.encode64(cipher.output.getBytes()),
      tag: forge.util.encode64(cipher.mode.tag.getBytes())
    };
  }

  function decryptPayload(data) {
    const key = hexToBytes(KEY_HEX);
    const nonce = forge.util.decode64(data.nonce);
    const ciphertext = forge.util.decode64(data.ciphertext);
    const tag = forge.util.decode64(data.tag);
    const decipher = forge.cipher.createDecipher("AES-GCM", key);
    decipher.start({ iv: nonce, tagLength: 128, tag: forge.util.createBuffer(tag) });
    decipher.update(forge.util.createBuffer(ciphertext));
    const ok = decipher.finish();
    if (!ok) throw new Error("Decryption failed (tag mismatch)");
    return forge.util.decodeUtf8(decipher.output.getBytes());
  }

  function appendLine(text, cls) {
    const div = document.createElement("div");
    div.className = "line " + (cls || "");
    div.textContent = text;
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function updatePrompt() {
    const display = currentCwd === "/root" ? "~" : currentCwd;
    promptLabel.textContent = "root@container:" + display + "# ";
  }

  function appendCmd(cmd) {
    const display = currentCwd === "/root" ? "~" : currentCwd;
    const div = document.createElement("div");
    div.className = "line cmd";
    div.innerHTML = '<span class="prompt-prefix">root@container</span>:<span class="prompt-path">' + escapeHtml(display) + '</span><span class="prompt-symbol"># </span>' + escapeHtml(cmd);
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function setStatus(msg, loading) {
    statusText.innerHTML = (loading ? '<span class="spinner"></span>' : '') + msg;
  }

  async function executeCommand(cmd) {
    if (busy) return;

    const trimmed = cmd.trim();
    if (!trimmed) return;

    if (trimmed === "clear") {
      terminal.innerHTML = "";
      return;
    }

    if (trimmed === "help") {
      appendCmd(trimmed);
      appendLine("Available commands:", "info");
      appendLine("  clear       - Clear terminal", "info");
      appendLine("  help        - Show this message", "info");
      appendLine("  Any Linux command is executed on the server", "info");
      appendLine("  All I/O is AES-256-GCM encrypted end-to-end", "info");
      appendLine("", "");
      return;
    }

    busy = true;
    appendCmd(trimmed);
    setStatus("Executing...", true);

    try {
      const encrypted = encryptText(trimmed);

      const resp = await fetch(EXEC_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(encrypted)
      });

      const data = await resp.json();
      let output = decryptPayload(data);

      if (output.startsWith("___CWD_RESP___:")) {
        const nlIdx = output.indexOf("\n");
        currentCwd = output.substring(15, nlIdx);
        output = output.substring(nlIdx + 1);
        updatePrompt();
      }

      appendLine(output, resp.ok ? "output" : "error");
    } catch (e) {
      appendLine("Connection error: " + e.message, "error");
    }

    setStatus("Ready", false);
    busy = false;
  }

  cmdInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      const cmd = cmdInput.value;
      if (cmd.trim()) {
        history.push(cmd);
        historyIdx = history.length;
      }
      cmdInput.value = "";
      executeCommand(cmd);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (historyIdx > 0) {
        historyIdx--;
        cmdInput.value = history[historyIdx];
      }
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      if (historyIdx < history.length - 1) {
        historyIdx++;
        cmdInput.value = history[historyIdx];
      } else {
        historyIdx = history.length;
        cmdInput.value = "";
      }
    }
  });

  document.addEventListener("click", function() {
    cmdInput.focus();
  });
})();
</script>
</body>
</html>
