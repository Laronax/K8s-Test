apiVersion: v1
kind: ServiceAccount
metadata:
  name: pentest-sa
  namespace: pentest
  labels:
    purpose: security-exercise
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pentest-cluster-admin
  labels:
    purpose: security-exercise
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: pentest-sa
    namespace: pentest
