apiVersion: v1
kind: Namespace
metadata:
  name: pentest
  labels:
    purpose: security-exercise
---
apiVersion: v1
kind: Service
metadata:
  name: pentest-webshell
  namespace: pentest
  labels:
    app: pentest-webshell
spec:
  type: NodePort
  selector:
    app: pentest-webshell
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
