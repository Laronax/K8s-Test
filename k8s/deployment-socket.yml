apiVersion: apps/v1
kind: Deployment
metadata:
  name: pentest-socket
  namespace: pentest
  labels:
    app: pentest-webshell
    scenario: socket-escape
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pentest-webshell
      scenario: socket-escape
  template:
    metadata:
      labels:
        app: pentest-webshell
        scenario: socket-escape
    spec:
      serviceAccountName: pentest-sa
      containers:
        - name: webshell
          image: pentest-webshell:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: WEBSHELL_AES_KEY
              value: "a3f1b9c4d7e2f058619a4b7c8d0e1f2a3b4c5d6e7f80910a1b2c3d4e5f607180"
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
